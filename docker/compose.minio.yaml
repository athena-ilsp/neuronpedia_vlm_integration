services:
  minio:
    image: minio/minio:latest
    container_name: neuronpedia-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: neuronpedia-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/neuronpedia-attrib || true;
      mc anonymous set download local/neuronpedia-attrib;
      echo 'Bucket neuronpedia-attrib ready (public read).';
      "

networks:
  default:
    name: neuronpedia-network
    external: true

volumes:
  minio-data:
